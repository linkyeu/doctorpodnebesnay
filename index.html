    <script>
      if (location.pathname.startsWith('/ai-course')) {

        // Preload hero image — LCP element, start downloading immediately
        var isMobile = window.innerWidth < 768;
        var link = document.createElement('link');
        link.rel = 'preload';
        link.as = 'image';
        link.type = 'image/webp';
        link.fetchPriority = 'high';
        link.href = isMobile ? '/images/ai-course/hero-mobile.webp' : '/images/ai-course/hero-desktop.webp';
        document.head.appendChild(link);
