[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Serve ai-course.html with correct OG tags for /ai-course
[[redirects]]
  from = "/ai-course"
  to = "/ai-course.html"
  status = 200

[[redirects]]
  from = "/ai-course/"
  to = "/ai-course.html"
  status = 200

# SPA fallback — serves index.html for all routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Long cache for hashed assets (Vite fingerprints these)
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cache for HTML entry points so users always get the latest version
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/ai-course.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Security headers for all pages
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
